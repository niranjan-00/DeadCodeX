{% extends "base.html" %}

{% block title %}Sign Up - {{ app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    </div>
    
    <div class="relative w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-500 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                </div>
                <span class="text-2xl font-bold text-white">Dead<span class="text-cyan-400">Code</span>X</span>
            </a>
        </div>
        
        <div class="glass rounded-2xl p-8">
            <h2 class="text-2xl font-bold text-white mb-2">Create account</h2>
            <p class="text-slate-400 text-sm mb-6">Start eliminating dead code today</p>
            
            <form id="signup-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
                        <input type="text" id="full_name" class="input-glass" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                        <input type="text" id="username" class="input-glass" placeholder="johndoe" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                    <input type="email" id="email" class="input-glass" placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                    <input type="password" id="password" class="input-glass" placeholder="Min 8 chars, letter + number" required>
                    <p class="text-xs text-slate-500 mt-1">Must be 8+ characters with letters and numbers</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Confirm Password</label>
                    <input type="password" id="confirm_password" class="input-glass" placeholder="Confirm password" required>
                </div>
                <label class="flex items-start gap-2 cursor-pointer">
                    <input type="checkbox" id="terms" class="mt-1 rounded bg-dark-800 border-slate-600 text-cyan-400 focus:ring-cyan-400" required>
                    <span class="text-sm text-slate-400">I agree to the <a href="#" class="text-cyan-400 hover:text-cyan-300">Terms</a> and <a href="#" class="text-cyan-400 hover:text-cyan-300">Privacy Policy</a></span>
                </label>
                <button type="submit" id="signup-btn" class="btn-primary w-full py-3 flex items-center justify-center gap-2">
                    <span>Create Account</span>
                    <svg id="signup-spinner" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-400">Already have an account? <a href="/login" class="text-cyan-400 hover:text-cyan-300 font-medium">Sign in</a></p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    const spinner = document.getElementById('signup-spinner');
    
    // Validation
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    
    if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
    }
    
    btn.disabled = true;
    spinner.classList.remove('hidden');
    
    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                password: password,
                full_name: document.getElementById('full_name').value
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            setToken(data.data.tokens.access_token);
            localStorage.setItem('refresh_token', data.data.tokens.refresh_token);
            localStorage.setItem('user', JSON.stringify(data.data.user));
            showToast('Account created! Welcome to DeadCodeX.', 'success');
            setTimeout(() => window.location.href = '/dashboard', 1500);
        } else {
            const msg = data.errors ? Object.values(data.errors).join(', ') : data.message;
            showToast(msg || 'Registration failed', 'error');
        }
    } catch (err) {
        showToast('Network error. Please try again.', 'error');
    } finally {
        btn.disabled = false;
        spinner.classList.add('hidden');
    }
});
</script>
{% endblock %}
