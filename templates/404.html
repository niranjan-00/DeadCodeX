{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <div class="text-8xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent mb-4">404</div>
        <h1 class="text-2xl font-bold text-white mb-2">Page Not Found</h1>
        <p class="text-slate-400 mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-primary">Go Home</a>
    </div>
</div>
{% endblock %}
