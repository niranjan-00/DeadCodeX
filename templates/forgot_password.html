{% extends "base.html" %}

{% block title %}Forgot Password - {{ app_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
    </div>
    
    <div class="relative w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-500 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                </div>
                <span class="text-2xl font-bold text-white">Dead<span class="text-cyan-400">Code</span>X</span>
            </a>
        </div>
        
        <div class="glass rounded-2xl p-8">
            <h2 class="text-2xl font-bold text-white mb-2">Reset password</h2>
            <p class="text-slate-400 text-sm mb-6">Enter your email and we'll send you reset instructions.</p>
            
            <form id="forgot-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                    <input type="email" id="email" class="input-glass" placeholder="you@example.com" required>
                </div>
                <button type="submit" id="submit-btn" class="btn-primary w-full py-3">Send Reset Link</button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-cyan-400 hover:text-cyan-300">Back to sign in</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    
    try {
        const response = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value })
        });
        const data = await response.json();
        showToast(data.message, data.success ? 'info' : 'warning');
    } catch {
        showToast('Network error', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
    }
});
</script>
{% endblock %}
