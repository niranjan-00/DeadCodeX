<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        dark: {
                            900: '#0a0a0f',
                            800: '#0f172a',
                            700: '#1e293b',
                            600: '#334155',
                            500: '#475569',
                        },
                        neon: {
                            cyan: '#00f0ff',
                            purple: '#a855f7',
                            pink: '#ec4899',
                            green: '#10b981',
                            orange: '#f59e0b',
                            red: '#ef4444',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0f; color: #e2e8f0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Neon glow effects */
        .glow-cyan { box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), 0 0 40px rgba(0, 240, 255, 0.1); }
        .glow-purple { box-shadow: 0 0 20px rgba(168, 85, 247, 0.3), 0 0 40px rgba(168, 85, 247, 0.1); }
        .glow-text-cyan { text-shadow: 0 0 10px rgba(0, 240, 255, 0.5), 0 0 20px rgba(0, 240, 255, 0.3); }
        .glow-text-purple { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5), 0 0 20px rgba(168, 85, 247, 0.3); }
        
        /* Glassmorphism */
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-strong { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Animated gradient background */
        .gradient-bg { background: linear-gradient(135deg, #0a0a0f 0%, #0f172a 50%, #1e1b4b 100%); }
        .gradient-bg-animated { 
            background: linear-gradient(-45deg, #0a0a0f, #0f172a, #1e1b4b, #0a0a0f);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); } 50% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.6); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scan-line { 0% { top: 0%; } 100% { top: 100%; } }
        
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
        .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Code blocks */
        .code-block { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; overflow-x: auto; }
        
        /* Buttons */
        .btn-primary { 
            background: linear-gradient(135deg, #00f0ff 0%, #a855f7 100%); 
            color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 8px; 
            transition: all 0.3s ease; border: none; cursor: pointer;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3); }
        .btn-secondary { 
            background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 8px;
            transition: all 0.3s ease; cursor: pointer;
        }
        .btn-secondary:hover { border-color: #00f0ff; color: #00f0ff; }
        
        /* Form inputs */
        .input-glass { 
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0; padding: 0.75rem 1rem; border-radius: 8px; width: 100%;
            transition: all 0.3s ease;
        }
        .input-glass:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1); }
        .input-glass::placeholder { color: #475569; }
        
        /* Cards */
        .card { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 1.5rem; transition: all 0.3s ease;
        }
        .card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
        
        /* Severity badges */
        .badge-critical { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-info { background: rgba(0, 240, 255, 0.15); color: #00f0ff; border: 1px solid rgba(0, 240, 255, 0.3); }
        
        /* Progress bar */
        .progress-bar { background: rgba(15, 23, 42, 0.8); border-radius: 999px; overflow: hidden; height: 8px; }
        .progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
        
        /* Sidebar nav */
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 8px; color: #94a3b8; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
        .nav-item.active { background: rgba(0, 240, 255, 0.1); color: #00f0ff; border-right: 2px solid #00f0ff; }
        
        /* Table */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 0.75rem 1rem; color: #94a3b8; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .data-table td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: #e2e8f0; }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }
        
        /* Scan line animation */
        .scanner-line { position: absolute; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #00f0ff, transparent); animation: scan-line 2s linear infinite; }
        
        /* Tooltip */
        .tooltip { position: relative; }
        .tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1e293b; color: #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.75rem; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Toast notification */
        .toast { 
            position: fixed; bottom: 1.5rem; right: 1.5rem; 
            background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 1rem 1.5rem; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateY(100px); opacity: 0; transition: all 0.4s ease;
            z-index: 100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        
        /* Status indicators */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.running { background: #00f0ff; animation: pulse-glow 1s ease infinite; }
        .status-dot.completed { background: #10b981; }
        .status-dot.failed { background: #ef4444; }
        .status-dot.pending { background: #f59e0b; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen gradient-bg">
    {% block content %}{% endblock %}
    
    <div id="toast" class="toast">
        <div class="flex items-center gap-3">
            <span id="toast-icon"></span>
            <span id="toast-message" class="text-sm font-medium"></span>
        </div>
    </div>
    
    <script>
        // Toast notification helper
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');
            
            const icons = {
                success: '<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
                error: '<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
                info: '<svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
                warning: '<svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
            };
            
            icon.innerHTML = icons[type] || icons.info;
            msg.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        
        // Auth helpers
        function getToken() {
            return localStorage.getItem('access_token');
        }
        
        function setToken(token) {
            localStorage.setItem('access_token', token);
        }
        
        function clearToken() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user');
        }
        
        function isLoggedIn() {
            return !!getToken();
        }
        
        // API helper
        async function api(url, options = {}) {
            const token = getToken();
            const defaults = {
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                }
            };
            
            const response = await fetch(url, { ...defaults, ...options, headers: { ...defaults.headers, ...options.headers } });
            
            if (response.status === 401) {
                clearToken();
                window.location.href = '/login';
                return null;
            }
            
            return response;
        }
        
        // Intersection Observer for animations
        const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-fade-in');
                    entry.target.style.opacity = '1';
                }
            });
        }, observerOptions);
        
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.scroll-animate').forEach(el => {
                el.style.opacity = '0';
                observer.observe(el);
            });
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
